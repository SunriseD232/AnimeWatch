    <script>
        function initPlayer() {
            if (typeof Playerjs !== 'undefined') {
                try {
                    const config = {
                        id: 'player-container',
                        design: 3,
                        file: [{
                            "title": "Сезон 1",
                            "folder": [{
                                "title": "Серия 1",
                                "file": "[480p]{Озвучка 1}"
                            }, {
                                "title": "Серия 2",
                                "file": "[480p]{Озвучка 2}"
                            }]
                        }],
                        color1: '#0066FF',
                        color2: '#00FFFF',
                        color3: '#000033',
                        color4: '#0099FF',
                        color5: '#CCFFFF'
                    };

                    const player = new Playerjs(config);

                    window.addEventListener('message', function(event) {
                        if (event.data && event.data.type === 'SET_COLOR' &&
                            event.data.design === 3) {
                            try {
                                if (player && player.api) {
                                    player.api(event.data.colorType, event.data.colorValue);
                                }
                            } catch (e) {
                            }
                        }
                    });

                } catch (error) {
                    setTimeout(initPlayer, 1000);
                }
            } else {
                setTimeout(initPlayer, 100);
            }
        }

        initPlayer();
    </script>
